<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Kanban</title>
  <!-- Google Fonts: Manrope (headlines) + Inter (body) -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* ── Font Size Scale (rem-based, scales with zoom) ── */
      --fs-xs: 0.5625rem;     /* 9px at base 16 */
      --fs-sm: 0.625rem;      /* 10px */
      --fs-caption: 0.6875rem; /* 11px */
      --fs-small: 0.75rem;    /* 12px */
      --fs-body: 0.8125rem;   /* 13px */
      --fs-base: 0.875rem;    /* 14px */
      --fs-md: 0.9375rem;     /* 15px */
      --fs-lg: 1rem;          /* 16px */
      --fs-xl: 1.125rem;      /* 18px */
      --fs-2xl: 1.25rem;      /* 20px */
      --fs-3xl: 1.375rem;     /* 22px */
      --fs-display: 2rem;     /* 32px */

      /* ── Surface Hierarchy (The Quiet Architect) ── */
      --bg-page: #f8f9fa;              /* surface — base canvas */
      --bg-surface: #ffffff;            /* surface-container-lowest — cards, primary focus */
      --bg-sidebar: #f1f4f6;           /* surface-container-low — sidebar, secondary */
      --bg-input: #f1f4f6;             /* surface-container-low — field backgrounds */
      --bg-elevated: #eaeff1;          /* surface-container — elevated areas */
      --bg-hover: #e3e9ec;             /* surface-container-high — hover states */
      --bg-highest: #dbe4e7;           /* surface-container-highest — badges, tracks */

      /* ── Text ── */
      --text-primary: #2b3437;         /* on-surface */
      --text-secondary: #586064;       /* on-surface-variant */
      --text-tertiary: #737c7f;        /* outline */
      --text-muted: #abb3b7;           /* outline-variant */
      --text-on-accent: #e9fbff;       /* on-primary */

      /* ── Borders — "ghost borders" at 15% opacity ── */
      --border: rgba(171, 179, 183, 0.15);         /* outline-variant at 15% */
      --border-light: rgba(171, 179, 183, 0.10);   /* even subtler */

      /* ── Shadows — ambient, diffused ── */
      --shadow-xs: none;
      --shadow-sm: 0px 2px 8px rgba(43, 52, 55, 0.04);
      --shadow-md: 0px 4px 16px rgba(43, 52, 55, 0.05);
      --shadow-lg: 0px 12px 32px rgba(43, 52, 55, 0.06);
      --shadow-dropdown: 0px 8px 24px rgba(43, 52, 55, 0.08);
      --overlay: rgba(43, 52, 55, 0.20);

      /* ── Primary: Sage/Teal ── */
      --green: #466369;                /* primary */
      --green-dark: #3a575d;           /* primary-dim */
      --green-bg: #c9e8ef;             /* primary-container */

      /* ── Claude: Muted purple ── */
      --purple: #7c5cbf;
      --purple-bg: #ede7f8;
      --purple-light-bg: #f5f0ff;
      --purple-border: rgba(124, 92, 191, 0.15);

      /* ── Accent: Blue ── */
      --blue: #466369;                 /* reuse primary for consistency */
      --blue-dark: #3a575d;
      --blue-bg: #c9e8ef;
      --blue-border: rgba(70, 99, 105, 0.15);
      --blue-light: #bbdae1;

      /* ── Accent: Orange/Attention ── */
      --orange: #b8860b;
      --orange-dark: #9a7209;
      --orange-bg: #fdf3dc;

      /* ── Accent: Red/Error ── */
      --red: #9f403d;
      --red-alpha: rgba(159, 64, 61, 0.12);

      /* ── Accent: Yellow ── */
      --yellow: #b8860b;
      --yellow-dark: #9a7209;
      --yellow-border: rgba(184, 134, 11, 0.15);
      --yellow-bg: #fdf3dc;
      --yellow-light-bg: #fef8ed;

      /* ── Tertiary: Sage green ── */
      --tertiary: #456650;
      --tertiary-container: #d4fadd;

      /* ── Scrollbar ── */
      --scrollbar-thumb: #abb3b7;
      --scrollbar-hover: #737c7f;

      /* ── Misc ── */
      --log-dot: #abb3b7;
      --card-selected-border: #466369;

      /* ── Sidebar width ── */
      --sidebar-width: 240px;

      /* ── Typography ── */
      --font-headline: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* ── Radii ── */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 12px;
      --radius-xl: 16px;
    }

    html.dark {
      /* ── Surface Hierarchy (Dark) ── */
      --bg-page: #111314;
      --bg-surface: #1a1d1e;
      --bg-sidebar: #151819;
      --bg-input: #1e2224;
      --bg-elevated: #222628;
      --bg-hover: #2a2f31;
      --bg-highest: #333839;

      /* ── Text ── */
      --text-primary: #e3e9ec;
      --text-secondary: #abb3b7;
      --text-tertiary: #737c7f;
      --text-muted: #586064;
      --text-on-accent: #e9fbff;

      /* ── Borders ── */
      --border: rgba(171, 179, 183, 0.10);
      --border-light: rgba(171, 179, 183, 0.06);

      /* ── Shadows ── */
      --shadow-xs: none;
      --shadow-sm: 0px 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-md: 0px 4px 16px rgba(0, 0, 0, 0.25);
      --shadow-lg: 0px 12px 32px rgba(0, 0, 0, 0.3);
      --shadow-dropdown: 0px 8px 24px rgba(0, 0, 0, 0.3);
      --overlay: rgba(0, 0, 0, 0.5);

      /* ── Primary ── */
      --green: #7ba3ab;
      --green-dark: #6a929a;
      --green-bg: #1a2e32;

      /* ── Claude ── */
      --purple: #a08bc0;
      --purple-bg: #2a1f3e;
      --purple-light-bg: #241c33;
      --purple-border: rgba(160, 139, 192, 0.15);

      /* ── Blue (= Primary) ── */
      --blue: #7ba3ab;
      --blue-dark: #6a929a;
      --blue-bg: #1a2e32;
      --blue-border: rgba(123, 163, 171, 0.15);
      --blue-light: #5a8a92;

      /* ── Orange ── */
      --orange: #d4a843;
      --orange-dark: #c49a35;
      --orange-bg: #2e2615;

      /* ── Red ── */
      --red: #d06b68;
      --red-alpha: rgba(208, 107, 104, 0.15);

      /* ── Yellow ── */
      --yellow: #d4a843;
      --yellow-dark: #c49a35;
      --yellow-border: rgba(212, 168, 67, 0.15);
      --yellow-bg: #2e2615;
      --yellow-light-bg: #2a2310;

      /* ── Tertiary ── */
      --tertiary: #6a9b7e;
      --tertiary-container: #1b2e22;

      /* ── Scrollbar ── */
      --scrollbar-thumb: #444;
      --scrollbar-hover: #666;

      /* ── Misc ── */
      --log-dot: #555;
      --card-selected-border: #7ba3ab;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; } /* Base for rem — zoom slider adjusts this */

    body {
      font-family: var(--font-body);
      font-size: var(--fs-body);
      background: var(--bg-page);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root { height: 100vh; display: flex; flex-direction: column; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes gentle-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes detail-overlay-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes detail-overlay-out { from { opacity: 1; } to { opacity: 0; } }
    @keyframes detail-panel-in { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes detail-panel-out { from { opacity: 1; transform: scale(1) translateY(0); } to { opacity: 0; transform: scale(0.95) translateY(10px); } }
    @keyframes modal-overlay-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modal-overlay-out { from { opacity: 1; } to { opacity: 0; } }
    @keyframes modal-in { from { opacity: 0; transform: scale(0.95) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes modal-out { from { opacity: 1; transform: scale(1) translateY(0); } to { opacity: 0; transform: scale(0.95) translateY(8px); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

    /* Material Symbols */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
      font-size: 20px;
    }

    /* Card context menu dots — show on hover */
    [style*="overflow: visible"]:hover > [style*="opacity: 0"] { opacity: 1 !important; }
    [style*="overflow: visible"]:hover > [style*="opacity: 0"]:hover { background: var(--bg-elevated); color: var(--text-secondary); }
    /* Menu item hover */
    button[style*="text-align: left"]:hover { background: var(--bg-hover) !important; }

    /* Quick Question markdown styles */
    .qq-markdown { font-size: var(--fs-body); line-height: 1.6; color: var(--text-primary); }
    .qq-markdown p { margin: 0 0 6px; }
    .qq-markdown p:last-child { margin-bottom: 0; }
    .qq-markdown br { display: none; }
    .qq-markdown h1, .qq-markdown h2, .qq-markdown h3 { margin: 12px 0 6px; font-weight: 600; color: var(--text-primary); font-family: var(--font-headline); }
    .qq-markdown h1 { font-size: var(--fs-lg); }
    .qq-markdown h2 { font-size: var(--fs-base); }
    .qq-markdown h3 { font-size: var(--fs-body); }
    .qq-markdown code {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: var(--fs-small);
      background: var(--bg-elevated);
      color: inherit;
      padding: 1px 5px;
      border-radius: 4px;
    }
    .qq-markdown pre {
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      padding: 10px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .qq-markdown pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: var(--fs-small);
      color: inherit;
      line-height: 1.5;
    }
    .qq-markdown ul, .qq-markdown ol { margin: 2px 0 4px 16px; padding: 0; }
    .qq-markdown li { margin: 0; padding: 0; line-height: 1.4; }
    .qq-markdown strong { font-weight: 600; }
    .qq-markdown a { color: var(--green); text-decoration: none; }
    .qq-markdown blockquote {
      border-left: 3px solid var(--bg-highest);
      margin: 8px 0;
      padding: 4px 12px;
      color: var(--text-tertiary);
    }
    .qq-markdown table { border-collapse: collapse; margin: 8px 0; width: 100%; font-size: var(--fs-small); }
    .qq-markdown th, .qq-markdown td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
    .qq-markdown th { background: var(--bg-elevated); font-weight: 600; }

    /* Syntax highlighting — Quiet Architect theme */
    .hljs { color: var(--text-primary); }
    .hljs-comment, .hljs-quote { color: var(--text-muted); font-style: italic; }
    .hljs-keyword, .hljs-selector-tag, .hljs-built_in { color: #7c5cbf; }
    .hljs-string, .hljs-attr { color: #456650; }
    .hljs-number, .hljs-literal { color: #b8860b; }
    .hljs-function, .hljs-title { color: #466369; }
    .hljs-type, .hljs-class .hljs-title { color: #7c5cbf; }
    .hljs-variable, .hljs-template-variable { color: #9f403d; }
    .hljs-regexp { color: #b8860b; }
    .hljs-symbol, .hljs-bullet { color: #456650; }
    .hljs-meta { color: var(--text-tertiary); }
    .hljs-deletion { color: #9f403d; background: var(--red-alpha); }
    .hljs-addition { color: #456650; background: rgba(69, 102, 80, 0.1); }
    .hljs-emphasis { font-style: italic; }
    .hljs-strong { font-weight: 600; }
    .hljs-tag { color: #9f403d; }
    .hljs-name { color: #466369; }
    .hljs-attr { color: #7c5cbf; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
